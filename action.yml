name: PR Risk Analyzer
description: >-
  A Github Action that identifies bus factor, bug hotspots, high volatility and churn.
author: rw-core
branding:
  icon: alert-circle
  color: orange

inputs:
  github-token:
    description: Token used to post the sticky PR comment (needs pull-requests:write).
    required: false
    default: ${{ github.token }}
  working-directory:
    description: Path (relative to the checkout) of the repository root to analyse.
    required: false
    default: '.'
  volatility-threshold:
    description: Threshold of volatility score to flag a file as highly volatile.
    required: false
    default: '20.0'
  fail-on-warning:
    description: When true, exit non-zero if the PR touches any bug hotspots or volatile files.
    required: false
    default: 'false'

outputs:
  bug-hotspots-count:
    description: Number of bug hotspots touched by the PR.
    value: ${{ steps.gate.outputs.bug-hotspots-count }}
  volatile-files-count:
    description: Number of highly volatile files touched by the PR.
    value: ${{ steps.gate.outputs.volatile-files-count }}
  bus-factor-score:
    description: A JSON string mapping each modified file to an object containing its bus factor, total developers, and top contributors.
    value: ${{ steps.gate.outputs.bus-factor-score }}
  tribal-knowledge-count:
    description: Number of files flagged for tribal knowledge risk.
    value: ${{ steps.gate.outputs.tribal-knowledge-count }}
  too-many-cooks-count:
    description: Number of files flagged for too many cooks risk.
    value: ${{ steps.gate.outputs.too-many-cooks-count }}
  departure-defect-count:
    description: Number of authors flagged for departure defect risk.
    value: ${{ steps.gate.outputs.departure-defect-count }}
  defect-injection-count:
    description: Number of files flagged as defect-injection predictors.
    value: ${{ steps.gate.outputs.defect-injection-count }}
  clean-up-exception-count:
    description: Number of highly volatile files safely explained by recent refactorings.
    value: ${{ steps.gate.outputs.clean-up-exception-count }}

runs:
  using: composite
  steps:
    - name: Run pr-risk-analyzer (native binary)
      id: gate
      shell: bash
      run: bash "$GITHUB_ACTION_PATH/scripts/run.sh"
      env:
        ACTION_REPO: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_VOLATILITY_THRESHOLD: ${{ inputs.volatility-threshold }}
        INPUT_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}

    - name: Set up Dart (fallback)
      if: steps.gate.outputs.mode == 'fallback'
      uses: dart-lang/setup-dart@v1
    - name: Run pr-risk-analyzer (from source, fallback)
      if: steps.gate.outputs.mode == 'fallback'
      shell: bash
      working-directory: ${{ github.action_path }}
      run: dart pub get && dart run bin/main.dart
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_WORKING_DIRECTORY: ${{ inputs.working-directory }}
        INPUT_VOLATILITY_THRESHOLD: ${{ inputs.volatility-threshold }}
        INPUT_FAIL_ON_WARNING: ${{ inputs.fail-on-warning }}
